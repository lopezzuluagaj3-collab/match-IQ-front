<script>
        // Micro-interaction for input focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#009e6d';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#74777d';
            });
        });

        // Simple button active state visual feedback
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.addEventListener('mousedown', () => {
            submitBtn.style.transform = 'scale(0.96)';
        });
        submitBtn.addEventListener('mouseup', () => {
            submitBtn.style.transform = 'scale(1)';
        });
    </script>
