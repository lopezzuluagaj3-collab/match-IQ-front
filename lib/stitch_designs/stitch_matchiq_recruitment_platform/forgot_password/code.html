<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password | MatchIQ</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#a4c9f8",
                    "on-primary-fixed-variant": "#34495c",
                    "primary": "#000f1d",
                    "primary-container": "#0f2537",
                    "error": "#ba1a1a",
                    "on-tertiary-fixed": "#002113",
                    "primary-fixed": "#cfe5fd",
                    "on-primary-container": "#788da3",
                    "tertiary-container": "#002a1a",
                    "on-surface-variant": "#43474c",
                    "outline-variant": "#c3c7cd",
                    "background": "#f7f9fb",
                    "surface-variant": "#e0e3e5",
                    "on-background": "#191c1e",
                    "primary-fixed-dim": "#b3c9e0",
                    "on-tertiary-fixed-variant": "#005236",
                    "on-primary-fixed": "#061d2f",
                    "on-secondary-fixed": "#001d36",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f7f9fb",
                    "secondary": "#3b618a",
                    "tertiary-fixed-dim": "#4edea3",
                    "on-surface": "#191c1e",
                    "secondary-fixed": "#d1e4ff",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#009e6d",
                    "tertiary-fixed": "#6ffbbe",
                    "secondary-container": "#aacffe",
                    "on-primary": "#ffffff",
                    "inverse-on-surface": "#eff1f3",
                    "surface-dim": "#d8dadc",
                    "inverse-primary": "#b3c9e0",
                    "on-secondary-fixed-variant": "#204971",
                    "surface": "#f7f9fb",
                    "surface-container-highest": "#e0e3e5",
                    "on-secondary": "#ffffff",
                    "surface-container-high": "#e6e8ea",
                    "inverse-surface": "#2d3133",
                    "on-error-container": "#93000a",
                    "surface-tint": "#4c6075",
                    "outline": "#74777d",
                    "surface-container-low": "#f2f4f6",
                    "surface-container": "#eceef0",
                    "tertiary": "#001209",
                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "on-secondary-container": "#325881"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "16px",
                    "base": "4px",
                    "xl": "64px",
                    "lg": "40px",
                    "container-max": "1280px",
                    "md": "24px",
                    "gutter": "24px",
                    "xs": "8px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "display": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-bold": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "1.4", "fontWeight": "400"}],
                    "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-bold": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        
        /* Custom focused ring for inputs based on design system */
        .focus-ring:focus {
            outline: none;
            border-color: #3b618a;
            box-shadow: 0 0 0 3px rgba(59, 97, 138, 0.2);
        }

        /* Glassmorphic elements */
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Fluid background animation */
        .bg-animate {
            background: linear-gradient(135deg, #f7f9fb 0%, #cfe5fd 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-animate min-h-screen flex items-center justify-center font-body-md text-on-background px-sm">
<!-- Content Area: Forgot Password Screen -->
<!-- Note: TopNavBar and SideNavBar are suppressed as per 'Linear/Transactional' rule -->
<main class="w-full max-w-md relative">
<!-- Brand identity anchor above the card -->
<div class="mb-lg text-center">
<h1 class="font-display text-display text-primary tracking-tight">MatchIQ</h1>
</div>
<!-- Forgot Password Card -->
<div class="glass-panel border border-outline-variant/30 rounded-[24px] p-lg shadow-[0px_12px_32px_rgba(15,37,55,0.12)] relative overflow-hidden">
<!-- Subtle AI Decorative Element (Top Right) -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-on-tertiary-container/10 rounded-full blur-3xl"></div>
<div class="relative z-10">
<header class="mb-lg">
<h2 class="font-headline-md text-headline-md text-primary mb-xs">Forgot Password</h2>
<p class="font-body-md text-on-surface-variant leading-relaxed">
                        Enter your email to receive a recovery link
                    </p>
</header>
<form class="space-y-md" id="recovery-form">
<!-- Email Input Group -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant block" for="email">
                            Work Email
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-[48px] pr-sm py-sm bg-white border border-outline-variant rounded-lg font-body-md focus-ring transition-all placeholder:text-outline/60" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- CTA Button (Navy Primary) -->
<button class="w-full bg-primary-container text-on-primary font-label-bold text-body-md py-sm rounded-lg hover:bg-primary transition-all active:scale-[0.98] flex items-center justify-center gap-xs" type="submit">
                        Send Recovery Link
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer Navigation -->
<footer class="mt-lg pt-lg border-t border-outline-variant/30 text-center">
<a class="inline-flex items-center gap-xs font-label-bold text-label-bold text-secondary hover:text-primary transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                        Back to Login
                    </a>
</footer>
</div>
</div>
<!-- Decorative Info Message (Self-Correcting UI Pattern) -->
<div class="mt-md px-sm text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant/80">
                Don't have an account? <a class="text-secondary font-label-bold hover:underline" href="#">Contact Admin</a>
</p>
</div>
</main>
<!-- Success Feedback Overlay (Hidden by Default) -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-primary/20 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300" id="success-overlay">
<div class="bg-white rounded-[24px] p-lg max-w-sm text-center shadow-2xl scale-95 transition-transform duration-300 transform" id="success-card">
<div class="w-16 h-16 bg-on-tertiary-container/10 text-on-tertiary-container rounded-full flex items-center justify-center mx-auto mb-md">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h3 class="font-headline-md text-headline-md text-primary mb-xs">Link Sent!</h3>
<p class="font-body-md text-on-surface-variant mb-lg">
                Check your inbox for instructions to reset your password. It should arrive within a few minutes.
            </p>
<button class="w-full bg-secondary-container text-on-secondary-container font-label-bold text-label-bold py-sm rounded-lg hover:bg-secondary-fixed transition-colors" onclick="closeSuccess()">
                Done
            </button>
</div>
</div>
<!-- Micro-interactions Script -->
<script>
        const form = document.getElementById('recovery-form');
        const overlay = document.getElementById('success-overlay');
        const successCard = document.getElementById('success-card');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Visual feedback for button
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Sending...';
            btn.disabled = true;

            // Simulate API Call
            setTimeout(() => {
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                successCard.classList.remove('scale-95');
                successCard.classList.add('scale-100');
                
                // Reset button
                btn.innerHTML = originalText;
                btn.disabled = false;
                form.reset();
            }, 1500);
        });

        function closeSuccess() {
            overlay.classList.add('opacity-0', 'pointer-events-none');
            successCard.classList.remove('scale-100');
            successCard.classList.add('scale-95');
        }

        // Atmospheric parallax effect on background elements
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const cards = document.querySelectorAll('.glass-panel');
            cards.forEach(card => {
                const shiftX = (x - 0.5) * 10;
                const shiftY = (y - 0.5) * 10;
                card.style.transform = `translate(${shiftX}px, ${shiftY}px)`;
            });
        });
    </script>
</body></html>
